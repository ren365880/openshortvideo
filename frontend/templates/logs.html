{% extends "layout.html" %}

{% block title %}日志管理 - 灵犀剧能{% endblock %}

{% block content %}
<div class="logs-page">
    <!-- 页面标题 -->
    <div class="page-header-modern">
        <div class="header-content">
            <div class="header-icon">
                <i class="fas fa-clipboard-list"></i>
            </div>
            <div class="header-text">
                <h1>系统日志</h1>
                <p>监控和管理您的系统运行记录</p>
            </div>
        </div>
        <div class="header-actions">
            <button class="btn btn-outline" onclick="cleanupLogs()">
                <i class="fas fa-broom"></i> 清理
            </button>
            <button class="btn btn-outline" onclick="compressLogs()">
                <i class="fas fa-compress-alt"></i> 压缩
            </button>
            <button class="btn btn-primary" onclick="exportLogs()">
                <i class="fas fa-download"></i> 导出
            </button>
        </div>
    </div>

    <!-- 统计信息 -->
    <div class="stats-grid">
        <div class="stat-card-modern stat-primary">
            <div class="stat-bg-icon">
                <i class="fas fa-database"></i>
            </div>
            <div class="stat-info">
                <span class="stat-value" id="totalLogs">-</span>
                <span class="stat-label">总日志</span>
            </div>
            <div class="stat-trend up">
                <i class="fas fa-arrow-up"></i>
            </div>
        </div>
        <div class="stat-card-modern stat-success">
            <div class="stat-bg-icon">
                <i class="fas fa-calendar-check"></i>
            </div>
            <div class="stat-info">
                <span class="stat-value" id="todayLogs">-</span>
                <span class="stat-label">今日新增</span>
            </div>
            <div class="stat-trend up">
                <i class="fas fa-arrow-up"></i>
            </div>
        </div>
        <div class="stat-card-modern stat-warning">
            <div class="stat-bg-icon">
                <i class="fas fa-file-alt"></i>
            </div>
            <div class="stat-info">
                <span class="stat-value" id="fileCount">-</span>
                <span class="stat-label">日志文件</span>
            </div>
            <div class="stat-trend neutral">
                <i class="fas fa-minus"></i>
            </div>
        </div>
        <div class="stat-card-modern stat-info">
            <div class="stat-bg-icon">
                <i class="fas fa-hdd"></i>
            </div>
            <div class="stat-info">
                <span class="stat-value" id="fileSize">-</span>
                <span class="stat-label">占用空间</span>
            </div>
            <div class="stat-trend down">
                <i class="fas fa-arrow-down"></i>
            </div>
        </div>
    </div>

    <!-- 筛选区域 -->
    <div class="filter-panel">
        <div class="filter-row">
            <div class="filter-group">
                <label>日志级别</label>
                <select id="levelFilter" class="filter-select">
                    <option value="">全部级别</option>
                    <option value="DEBUG">🔵 DEBUG</option>
                    <option value="INFO">🟢 INFO</option>
                    <option value="WARNING">🟡 WARNING</option>
                    <option value="ERROR">🔴 ERROR</option>
                    <option value="CRITICAL">⚫ CRITICAL</option>
                </select>
            </div>
            <div class="filter-group">
                <label>分类</label>
                <select id="categoryFilter" class="filter-select">
                    <option value="">全部分类</option>
                </select>
            </div>
            <div class="filter-group flex-1">
                <label>搜索操作</label>
                <div class="search-input">
                    <i class="fas fa-search"></i>
                    <input type="text" id="actionFilter" placeholder="输入操作关键词...">
                </div>
            </div>
        </div>
        <div class="filter-row">
            <div class="filter-group">
                <label>开始日期</label>
                <input type="date" id="startDate" class="filter-date">
            </div>
            <div class="filter-group">
                <label>结束日期</label>
                <input type="date" id="endDate" class="filter-date">
            </div>
            <div class="filter-group">
                <label>&nbsp;</label>
                <div class="filter-buttons">
                    <button class="btn btn-outline btn-sm" onclick="applyFilters()">
                        <i class="fas fa-filter"></i> 应用
                    </button>
                    <button class="btn btn-ghost btn-sm" onclick="resetFilters()">
                        <i class="fas fa-undo"></i> 重置
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 日志列表 -->
    <div class="logs-panel">
        <div class="panel-header">
            <h3><i class="fas fa-list"></i> 日志记录</h3>
            <span class="logs-count" id="logsCount">加载中...</span>
        </div>
        <div class="logs-table-wrapper">
            <table class="logs-table">
                <thead>
                    <tr>
                        <th class="th-time">时间</th>
                        <th class="th-level">级别</th>
                        <th class="th-category">分类</th>
                        <th class="th-action">操作描述</th>
                        <th class="th-user">用户</th>
                        <th class="th-duration">耗时</th>
                        <th class="th-status">状态</th>
                        <th class="th-actions">操作</th>
                    </tr>
                </thead>
                <tbody id="logsTableBody">
                    <!-- 日志将通过JavaScript动态加载 -->
                </tbody>
            </table>
        </div>
        
        <!-- 分页 -->
        <div class="pagination-modern" id="pagination">
        </div>
    </div>
</div>

<!-- 日志详情模态框 -->
<div class="modal-overlay" id="logDetailModal">
    <div class="modal-container">
        <div class="modal-header-modern">
            <div class="modal-title-wrapper">
                <div class="modal-icon" id="modalIcon">
                    <i class="fas fa-info-circle"></i>
                </div>
                <div class="modal-title-text">
                    <h2>日志详情</h2>
                    <span class="modal-subtitle" id="modalSubtitle">详细信息查看</span>
                </div>
            </div>
            <button class="modal-close" onclick="closeModal()">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="modal-body-modern" id="logDetailContent">
        </div>
    </div>
</div>
{% endblock %}

{% block styles %}
<style>
    /* 页面整体样式 */
    .logs-page {
        max-width: 1400px;
        margin: 0 auto;
        padding: 24px;
    }

    /* 页面标题 */
    .page-header-modern {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 24px;
        padding: 24px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border-radius: 16px;
        color: white;
    }

    .header-content {
        display: flex;
        align-items: center;
        gap: 16px;
    }

    .header-icon {
        width: 64px;
        height: 64px;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
    }

    .header-text h1 {
        font-size: 28px;
        font-weight: 700;
        margin: 0 0 4px 0;
    }

    .header-text p {
        opacity: 0.9;
        margin: 0;
        font-size: 14px;
    }

    .header-actions {
        display: flex;
        gap: 12px;
    }

    .header-actions .btn {
        background: rgba(255, 255, 255, 0.15);
        border-color: rgba(255, 255, 255, 0.3);
        color: white;
    }

    .header-actions .btn:hover {
        background: rgba(255, 255, 255, 0.25);
    }

    /* 统计卡片 */
    .stats-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 20px;
        margin-bottom: 24px;
    }

    @media (max-width: 1200px) {
        .stats-grid {
            grid-template-columns: repeat(2, 1fr);
        }
    }

    @media (max-width: 600px) {
        .stats-grid {
            grid-template-columns: 1fr;
        }
    }

    .stat-card-modern {
        background: white;
        border-radius: 16px;
        padding: 20px;
        display: flex;
        align-items: center;
        gap: 16px;
        position: relative;
        overflow: hidden;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        transition: transform 0.2s, box-shadow 0.2s;
    }

    .stat-card-modern:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
    }

    .stat-bg-icon {
        width: 56px;
        height: 56px;
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
    }

    .stat-primary .stat-bg-icon { background: linear-gradient(135deg, #667eea20, #764ba220); color: #667eea; }
    .stat-success .stat-bg-icon { background: linear-gradient(135deg, #11998e20, #38ef7d20); color: #11998e; }
    .stat-warning .stat-bg-icon { background: linear-gradient(135deg, #f093fb20, #f5576c20); color: #f5576c; }
    .stat-info .stat-bg-icon { background: linear-gradient(135deg, #4facfe20, #00f2fe20); color: #4facfe; }

    .stat-info {
        flex: 1;
    }

    .stat-value {
        display: block;
        font-size: 28px;
        font-weight: 700;
        color: var(--text-primary);
        line-height: 1.2;
    }

    .stat-label {
        font-size: 13px;
        color: var(--text-secondary);
    }

    .stat-trend {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
    }

    .stat-trend.up { background: #d1fae5; color: #059669; }
    .stat-trend.down { background: #fee2e2; color: #dc2626; }
    .stat-trend.neutral { background: #f3f4f6; color: #6b7280; }

    /* 筛选面板 */
    .filter-panel {
        background: white;
        border-radius: 16px;
        padding: 24px;
        margin-bottom: 24px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
    }

    .filter-row {
        display: flex;
        gap: 20px;
        margin-bottom: 16px;
    }

    .filter-row:last-child {
        margin-bottom: 0;
    }

    .filter-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
    }

    .filter-group label {
        font-size: 13px;
        font-weight: 500;
        color: var(--text-secondary);
    }

    .filter-group.flex-1 {
        flex: 1;
    }

    .filter-select {
        padding: 10px 16px;
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        font-size: 14px;
        background: white;
        min-width: 160px;
        cursor: pointer;
        transition: border-color 0.2s;
    }

    .filter-select:focus {
        outline: none;
        border-color: #667eea;
    }

    .filter-date {
        padding: 10px 16px;
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        font-size: 14px;
        background: white;
        cursor: pointer;
    }

    .filter-date:focus {
        outline: none;
        border-color: #667eea;
    }

    .search-input {
        position: relative;
        flex: 1;
    }

    .search-input i {
        position: absolute;
        left: 14px;
        top: 50%;
        transform: translateY(-50%);
        color: #9ca3af;
    }

    .search-input input {
        width: 100%;
        padding: 10px 16px 10px 42px;
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        font-size: 14px;
        transition: border-color 0.2s;
    }

    .search-input input:focus {
        outline: none;
        border-color: #667eea;
    }

    .filter-buttons {
        display: flex;
        gap: 8px;
    }

    .btn-sm {
        padding: 8px 16px;
        font-size: 13px;
    }

    .btn-ghost {
        background: transparent;
        border: none;
        color: var(--text-secondary);
    }

    .btn-ghost:hover {
        color: var(--text-primary);
    }

    /* 日志面板 */
    .logs-panel {
        background: white;
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
    }

    .panel-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 24px;
        border-bottom: 1px solid #f3f4f6;
    }

    .panel-header h3 {
        font-size: 16px;
        font-weight: 600;
        color: var(--text-primary);
        margin: 0;
    }

    .panel-header h3 i {
        margin-right: 8px;
        color: #667eea;
    }

    .logs-count {
        font-size: 13px;
        color: var(--text-secondary);
        background: #f3f4f6;
        padding: 4px 12px;
        border-radius: 20px;
    }

    .logs-table-wrapper {
        overflow-x: auto;
    }

    .logs-table {
        width: 100%;
        border-collapse: collapse;
        min-width: 900px;
    }

    .logs-table th {
        padding: 14px 16px;
        text-align: left;
        font-size: 12px;
        font-weight: 600;
        color: var(--text-secondary);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        background: #f9fafb;
        border-bottom: 1px solid #e5e7eb;
    }

    .logs-table td {
        padding: 14px 16px;
        font-size: 14px;
        color: var(--text-primary);
        border-bottom: 1px solid #f3f4f6;
    }

    .logs-table tbody tr {
        transition: background 0.2s;
    }

    .logs-table tbody tr:hover {
        background: #f9fafb;
    }

    /* 级别徽章 */
    .level-badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 4px 10px;
        border-radius: 20px;
        font-size: 11px;
        font-weight: 600;
    }

    .level-debug { background: #e0e7ff; color: #4f46e5; }
    .level-info { background: #d1fae5; color: #059669; }
    .level-warning { background: #fef3c7; color: #d97706; }
    .level-error { background: #fee2e2; color: #dc2626; }
    .level-critical { background: #1f2937; color: #f9fafb; }

    /* 状态图标 */
    .status-icon {
        display: inline-flex;
        align-items: center;
        gap: 4px;
    }

    .status-success { color: #059669; }
    .status-failed { color: #dc2626; }
    .status-pending { color: #d97706; }

    /* 操作按钮 */
    .action-btn {
        padding: 6px 12px;
        border-radius: 6px;
        font-size: 12px;
        cursor: pointer;
        transition: all 0.2s;
        background: #f3f4f6;
        border: none;
        color: var(--text-secondary);
    }

    .action-btn:hover {
        background: #667eea;
        color: white;
    }

    /* 分页 */
    .pagination-modern {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        padding: 20px;
        border-top: 1px solid #f3f4f6;
    }

    .pagination-modern button {
        padding: 8px 14px;
        border: 1px solid #e5e7eb;
        background: white;
        border-radius: 8px;
        font-size: 14px;
        cursor: pointer;
        transition: all 0.2s;
    }

    .pagination-modern button:hover:not(:disabled) {
        border-color: #667eea;
        color: #667eea;
    }

    .pagination-modern button.active {
        background: #667eea;
        border-color: #667eea;
        color: white;
    }

    .pagination-modern button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
    }

    /* 模态框 */
    .modal-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(4px);
        z-index: 1000;
        align-items: center;
        justify-content: center;
        padding: 20px;
    }

    .modal-overlay.active {
        display: flex;
    }

    .modal-container {
        background: white;
        border-radius: 20px;
        width: 100%;
        max-width: 700px;
        max-height: 85vh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        animation: modalSlideIn 0.3s ease;
    }

    @keyframes modalSlideIn {
        from {
            opacity: 0;
            transform: translateY(-20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .modal-header-modern {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 24px;
        border-bottom: 1px solid #f3f4f6;
    }

    .modal-title-wrapper {
        display: flex;
        align-items: center;
        gap: 16px;
    }

    .modal-icon {
        width: 48px;
        height: 48px;
        border-radius: 12px;
        background: linear-gradient(135deg, #667eea, #764ba2);
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 20px;
    }

    .modal-title-text h2 {
        font-size: 18px;
        font-weight: 600;
        color: var(--text-primary);
        margin: 0 0 2px 0;
    }

    .modal-subtitle {
        font-size: 13px;
        color: var(--text-secondary);
    }

    .modal-close {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        border: none;
        background: #f3f4f6;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-secondary);
        transition: all 0.2s;
    }

    .modal-close:hover {
        background: #fee2e2;
        color: #dc2626;
    }

    .modal-body-modern {
        padding: 24px;
        overflow-y: auto;
    }

    /* 详情行 */
    .detail-section {
        margin-bottom: 24px;
    }

    .detail-section:last-child {
        margin-bottom: 0;
    }

    .section-title {
        font-size: 12px;
        font-weight: 600;
        color: var(--text-secondary);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 12px;
        padding-bottom: 8px;
        border-bottom: 1px solid #e5e7eb;
    }

    .detail-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 16px;
    }

    @media (max-width: 600px) {
        .detail-grid {
            grid-template-columns: 1fr;
        }
    }

    .detail-item {
        display: flex;
        flex-direction: column;
        gap: 4px;
    }

    .detail-label {
        font-size: 12px;
        color: var(--text-secondary);
    }

    .detail-value {
        font-size: 14px;
        color: var(--text-primary);
        font-weight: 500;
    }

    .detail-value.empty {
        color: #9ca3af;
        font-style: italic;
    }

    /* 代码块 */
    .code-block {
        background: #1f2937;
        border-radius: 10px;
        padding: 16px;
        font-family: 'Monaco', 'Consolas', monospace;
        font-size: 12px;
        line-height: 1.6;
        overflow-x: auto;
        color: #e5e7eb;
    }

    .code-block pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-all;
    }

    .code-block.error {
        background: #fef2f2;
        border: 1px solid #fecaca;
        color: #991b1b;
    }

    /* 响应式 */
    @media (max-width: 768px) {
        .page-header-modern {
            flex-direction: column;
            gap: 16px;
            text-align: center;
        }

        .header-content {
            flex-direction: column;
        }

        .filter-row {
            flex-direction: column;
        }

        .filter-group {
            width: 100%;
        }

        .filter-select,
        .filter-date {
            width: 100%;
        }
    }
</style>
{% endblock %}

{% block scripts %}
<script>
    let currentPage = 1;
    let totalPages = 1;

    document.addEventListener('DOMContentLoaded', function() {
        loadStats();
        loadLogs();
        loadCategories();
    });

    async function loadStats() {
        try {
            const response = await fetch('/logs/api/stats');
            const data = await response.json();
            
            if (data.success) {
                document.getElementById('totalLogs').textContent = formatNumber(data.db_stats.total);
                document.getElementById('todayLogs').textContent = formatNumber(data.db_stats.today);
                document.getElementById('fileCount').textContent = formatNumber(data.file_stats.total_files);
                document.getElementById('fileSize').textContent = formatFileSize(data.file_stats.total_size);
            }
        } catch (error) {
            console.error('加载统计信息失败:', error);
        }
    }

    async function loadLogs(page = 1) {
        try {
            const params = new URLSearchParams({
                page: page,
                per_page: 15
            });

            const level = document.getElementById('levelFilter').value;
            const category = document.getElementById('categoryFilter').value;
            const action = document.getElementById('actionFilter').value;
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;

            if (level) params.append('level', level);
            if (category) params.append('category', category);
            if (action) params.append('action', action);
            if (startDate) params.append('start_date', startDate);
            if (endDate) params.append('end_date', endDate);

            const response = await fetch(`/logs/api/list?${params}`);
            const data = await response.json();

            if (data.success) {
                renderLogs(data.logs);
                currentPage = data.pagination.page;
                totalPages = data.pagination.pages;
                document.getElementById('logsCount').textContent = 
                    `共 ${data.pagination.total} 条记录`;
                renderPagination();
            }
        } catch (error) {
            console.error('加载日志失败:', error);
        }
    }

    function renderLogs(logs) {
        const tbody = document.getElementById('logsTableBody');
        if (logs.length === 0) {
            tbody.innerHTML = `
                <tr>
                    <td colspan="8" style="text-align: center; padding: 60px 20px; color: #9ca3af;">
                        <i class="fas fa-inbox" style="font-size: 48px; margin-bottom: 16px; display: block;"></i>
                        <p>暂无日志记录</p>
                    </td>
                </tr>
            `;
            return;
        }
        
        tbody.innerHTML = logs.map(log => `
            <tr>
                <td><span class="time-text">${formatDateTime(log.created_at)}</span></td>
                <td><span class="level-badge level-${log.level.toLowerCase()}">${getLevelIcon(log.level)} ${log.level}</span></td>
                <td><span class="category-tag">${log.category}</span></td>
                <td><span class="action-text" title="${log.action}">${truncate(log.action, 40)}</span></td>
                <td>${log.username || '<span class="text-muted">系统</span>'}</td>
                <td>${log.duration_ms ? `<span class="duration-badge">${log.duration_ms}ms</span>` : '-'}</td>
                <td>
                    <span class="status-icon status-${log.status}">
                        ${getStatusIcon(log.status)}
                        ${log.status}
                    </span>
                </td>
                <td>
                    <button class="action-btn" onclick="viewLogDetail(${log.id})">
                        <i class="fas fa-eye"></i> 查看
                    </button>
                </td>
            </tr>
        `).join('');
    }

    function renderPagination() {
        const pagination = document.getElementById('pagination');
        let html = `
            <button onclick="loadLogs(${currentPage - 1})" ${currentPage <= 1 ? 'disabled' : ''}>
                <i class="fas fa-chevron-left"></i>
            </button>
        `;

        const pages = getPaginationPages(currentPage, totalPages);
        pages.forEach(page => {
            if (page === '...') {
                html += `<span style="padding: 8px;">...</span>`;
            } else {
                html += `<button class="${page === currentPage ? 'active' : ''}" onclick="loadLogs(${page})">${page}</button>`;
            }
        });

        html += `
            <button onclick="loadLogs(${currentPage + 1})" ${currentPage >= totalPages ? 'disabled' : ''}>
                <i class="fas fa-chevron-right"></i>
            </button>
        `;

        pagination.innerHTML = html;
    }

    function getPaginationPages(current, total) {
        const pages = [];
        if (total <= 7) {
            for (let i = 1; i <= total; i++) pages.push(i);
        } else {
            if (current <= 4) {
                for (let i = 1; i <= 5; i++) pages.push(i);
                pages.push('...');
                pages.push(total);
            } else if (current >= total - 3) {
                pages.push(1);
                pages.push('...');
                for (let i = total - 4; i <= total; i++) pages.push(i);
            } else {
                pages.push(1);
                pages.push('...');
                for (let i = current - 1; i <= current + 1; i++) pages.push(i);
                pages.push('...');
                pages.push(total);
            }
        }
        return pages;
    }

    async function loadCategories() {
        try {
            const response = await fetch('/logs/api/categories');
            const data = await response.json();
            
            if (data.success) {
                const select = document.getElementById('categoryFilter');
                data.categories.forEach(category => {
                    const option = document.createElement('option');
                    option.value = category;
                    option.textContent = category;
                    select.appendChild(option);
                });
            }
        } catch (error) {
            console.error('加载分类失败:', error);
        }
    }

    function applyFilters() {
        loadLogs(1);
    }

    function resetFilters() {
        document.getElementById('levelFilter').value = '';
        document.getElementById('categoryFilter').value = '';
        document.getElementById('actionFilter').value = '';
        document.getElementById('startDate').value = '';
        document.getElementById('endDate').value = '';
        loadLogs(1);
    }

    async function viewLogDetail(logId) {
        try {
            const response = await fetch(`/logs/api/${logId}`);
            const data = await response.json();

            if (data.success) {
                const log = data.log;
                
                // 更新模态框样式
                const modalIcon = document.getElementById('modalIcon');
                modalIcon.style.background = getLevelGradient(log.level);
                
                document.getElementById('modalSubtitle').textContent = `ID: ${log.id} • ${log.category}`;

                // 构建详情内容
                let html = `
                    <div class="detail-section">
                        <div class="section-title">基本信息</div>
                        <div class="detail-grid">
                            <div class="detail-item">
                                <span class="detail-label">时间</span>
                                <span class="detail-value">${formatDateTime(log.created_at)}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">级别</span>
                                <span class="detail-value">
                                    <span class="level-badge level-${log.level.toLowerCase()}">
                                        ${getLevelIcon(log.level)} ${log.level}
                                    </span>
                                </span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">分类</span>
                                <span class="detail-value">${log.category}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">状态</span>
                                <span class="detail-value status-icon status-${log.status}">
                                    ${getStatusIcon(log.status)} ${log.status}
                                </span>
                            </div>
                        </div>
                    </div>

                    <div class="detail-section">
                        <div class="section-title">操作信息</div>
                        <div class="detail-grid">
                            <div class="detail-item">
                                <span class="detail-label">操作</span>
                                <span class="detail-value">${log.action}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">用户</span>
                                <span class="detail-value">${log.username || '系统'} (ID: ${log.user_id || '-'})</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">IP地址</span>
                                <span class="detail-value">${log.ip_address || '<span class="detail-value empty">未知</span>'}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">耗时</span>
                                <span class="detail-value">${log.duration_ms ? log.duration_ms + 'ms' : '<span class="detail-value empty">-</span>'}</span>
                            </div>
                        </div>
                    </div>
                `;

                // 添加请求/响应数据
                if (log.request_data || log.response_data || log.error_message) {
                    html += `<div class="detail-section">`;
                    html += `<div class="section-title">详细信息</div>`;
                    
                    if (log.error_message) {
                        html += `
                            <div class="detail-item" style="margin-bottom: 12px;">
                                <span class="detail-label">错误信息</span>
                                <div class="code-block error">${log.error_message}</div>
                            </div>
                        `;
                    }
                    
                    if (log.request_data) {
                        html += `
                            <div class="detail-item" style="margin-bottom: 12px;">
                                <span class="detail-label">请求数据</span>
                                <div class="code-block"><pre>${JSON.stringify(JSON.parse(log.request_data), null, 2)}</pre></div>
                            </div>
                        `;
                    }
                    
                    if (log.response_data) {
                        html += `
                            <div class="detail-item">
                                <span class="detail-label">响应数据</span>
                                <div class="code-block"><pre>${JSON.stringify(JSON.parse(log.response_data), null, 2)}</pre></div>
                            </div>
                        `;
                    }
                    
                    html += `</div>`;
                }

                document.getElementById('logDetailContent').innerHTML = html;
                document.getElementById('logDetailModal').classList.add('active');
            }
        } catch (error) {
            console.error('加载日志详情失败:', error);
        }
    }

    function closeModal() {
        document.getElementById('logDetailModal').classList.remove('active');
    }

    async function cleanupLogs() {
        if (!confirm('确定要清理30天前的日志吗？')) return;
        try {
            const response = await fetch('/logs/api/cleanup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ days: 30 })
            });
            const data = await response.json();
            if (data.success) {
                alert('✅ ' + data.message);
                loadStats();
                loadLogs();
            } else {
                alert('❌ 清理失败: ' + data.error);
            }
        } catch (error) {
            alert('❌ 清理失败');
        }
    }

    async function compressLogs() {
        if (!confirm('确定要压缩7天前的日志文件吗？')) return;
        try {
            const response = await fetch('/logs/api/compress', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ days: 7 })
            });
            const data = await response.json();
            if (data.success) {
                alert('✅ ' + data.message);
                loadStats();
            } else {
                alert('❌ 压缩失败: ' + data.error);
            }
        } catch (error) {
            alert('❌ 压缩失败');
        }
    }

    function exportLogs() {
        const startDate = document.getElementById('startDate').value;
        const endDate = document.getElementById('endDate').value;
        let url = '/logs/api/export';
        const params = [];
        if (startDate) params.push(`start_date=${startDate}`);
        if (endDate) params.push(`end_date=${endDate}`);
        if (params.length > 0) url += '?' + params.join('&');
        window.open(url, '_blank');
    }

    // 工具函数
    function formatNumber(num) {
        if (num >= 10000) return (num / 10000).toFixed(1) + '万';
        if (num >= 1000) return (num / 1000).toFixed(1) + 'k';
        return num?.toLocaleString() || '0';
    }

    function formatDateTime(dateString) {
        if (!dateString) return '-';
        const date = new Date(dateString);
        return date.toLocaleString('zh-CN', { 
            month: '2-digit', 
            day: '2-digit', 
            hour: '2-digit', 
            minute: '2-digit' 
        });
    }

    function formatFileSize(bytes) {
        if (bytes === 0) return '0 B';
        const k = 1024;
        const sizes = ['B', 'KB', 'MB', 'GB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
    }

    function truncate(str, length) {
        return str?.length > length ? str.substring(0, length) + '...' : str || '-';
    }

    function getLevelIcon(level) {
        const icons = {
            'DEBUG': '🔵',
            'INFO': '🟢',
            'WARNING': '🟡',
            'ERROR': '🔴',
            'CRITICAL': '⚫'
        };
        return icons[level] || '⚪';
    }

    function getLevelGradient(level) {
        const gradients = {
            'DEBUG': 'linear-gradient(135deg, #667eea, #764ba2)',
            'INFO': 'linear-gradient(135deg, #11998e, #38ef7d)',
            'WARNING': 'linear-gradient(135deg, #f093fb, #f5576c)',
            'ERROR': 'linear-gradient(135deg, #ff416c, #ff4b2b)',
            'CRITICAL': 'linear-gradient(135deg, #1f2937, #374151)'
        };
        return gradients[level] || 'linear-gradient(135deg, #667eea, #764ba2)';
    }

    function getStatusIcon(status) {
        const icons = {
            'success': '✅',
            'failed': '❌',
            'pending': '⏳'
        };
        return icons[status] || '⚪';
    }

    document.getElementById('logDetailModal').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });

    // ESC关闭模态框
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeModal();
    });
</script>
{% endblock %}
