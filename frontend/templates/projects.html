<!-- templates/projects.html -->
{% extends "layout.html" %}

{% block title %}我的项目 - 灵犀剧能{% endblock %}

{% block content %}
<div class="projects-container">
    <!-- 页面标题和操作 -->
    <div class="page-header">
        <div class="header-content">
            <h1 class="page-title">我的项目</h1>
            <p class="page-subtitle">管理您的所有短剧项目</p>
        </div>
        <div class="header-actions">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="搜索项目..." class="search-input">
            </div>
            <button class="btn btn-primary btn-lg" onclick="location.href='/projects/create'">
                <i class="fas fa-plus"></i> 新建项目
            </button>
        </div>
    </div>

    <!-- 过滤选项卡 -->
    <div class="filter-tabs">
        <div class="tabs-container">
            <button class="tab-btn active" data-filter="all">全部项目</button>
            <button class="tab-btn" data-filter="draft">草稿</button>
            <button class="tab-btn" data-filter="active">进行中</button>
            <button class="tab-btn" data-filter="completed">已完成</button>
            <button class="tab-btn" data-filter="public">已公开</button>
        </div>
        <div class="filter-actions">
            <select id="sortSelect" class="sort-select">
                <option value="newest">最新创建</option>
                <option value="oldest">最早创建</option>
                <option value="updated">最近更新</option>
                <option value="name_asc">名称 A-Z</option>
                <option value="name_desc">名称 Z-A</option>
            </select>
            <button class="btn btn-outline" id="filterBtn">
                <i class="fas fa-filter"></i> 筛选
            </button>
        </div>
    </div>

    <!-- 项目网格 -->
    <div class="projects-grid" id="projectsGrid">
        <!-- 项目将通过JavaScript动态加载 -->
        <div class="loading-placeholder">
            <div class="spinner"></div>
            <p>正在加载项目...</p>
        </div>
    </div>

    <!-- 分页控件 -->
    <div class="pagination" id="pagination">
        <!-- 分页将通过JavaScript动态生成 -->
    </div>

    <!-- 空状态 -->
    <div class="empty-state" id="emptyState" style="display: none;">
        <div class="empty-icon">
            <i class="fas fa-film"></i>
        </div>
        <h3 class="empty-title">还没有项目</h3>
        <p class="empty-description">
            开始创建您的第一个短剧项目，将您的创意变为现实。
        </p>
        <button class="btn btn-primary btn-lg" onclick="location.href='/projects/create'">
            <i class="fas fa-plus"></i> 创建第一个项目
        </button>
    </div>
</div>

<!-- 项目操作菜单模态框 -->
<div class="modal" id="projectMenuModal">
    <div class="modal-content modal-sm">
        <div class="modal-header">
            <h3 class="modal-title">项目操作</h3>
            <button class="modal-close">&times;</button>
        </div>
        <div class="modal-body">
            <div class="menu-list">
                <button class="menu-item" data-action="edit">
                    <i class="fas fa-edit"></i> 编辑项目
                </button>
                <button class="menu-item" data-action="duplicate">
                    <i class="fas fa-copy"></i> 复制项目
                </button>
                <button class="menu-item" data-action="export">
                    <i class="fas fa-download"></i> 导出项目
                </button>
                <div class="menu-divider"></div>
                <button class="menu-item text-danger" data-action="delete">
                    <i class="fas fa-trash"></i> 删除项目
                </button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block styles %}
<style>
    .projects-container {
        max-width: 1400px;
        margin: 0 auto;
    }

    .page-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: var(--spacing-2xl);
        flex-wrap: wrap;
        gap: var(--spacing-lg);
    }

    .page-title {
        font-size: var(--font-size-3xl);
        font-weight: 700;
        color: var(--text-primary);
        margin-bottom: var(--spacing-xs);
    }

    .page-subtitle {
        color: var(--text-secondary);
        font-size: var(--font-size-base);
    }

    .header-actions {
        display: flex;
        align-items: center;
        gap: var(--spacing-lg);
    }

    .search-box {
        position: relative;
        width: 300px;
    }

    .search-box i {
        position: absolute;
        left: var(--spacing-lg);
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-tertiary);
    }

    .search-input {
        width: 100%;
        padding: var(--spacing-md) var(--spacing-lg) var(--spacing-md) calc(var(--spacing-lg) * 2 + 12px);
        border: 1px solid var(--border-color);
        border-radius: var(--border-radius);
        font-size: var(--font-size-base);
        transition: all var(--transition-base);
    }

    .search-input:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
    }

    .filter-tabs {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: var(--spacing-xl);
        padding-bottom: var(--spacing-lg);
        border-bottom: 1px solid var(--border-color);
        flex-wrap: wrap;
        gap: var(--spacing-lg);
    }

    .tabs-container {
        display: flex;
        gap: var(--spacing-xs);
        overflow-x: auto;
        padding-bottom: 2px;
    }

    .tab-btn {
        padding: var(--spacing-sm) var(--spacing-lg);
        background: none;
        border: none;
        border-radius: var(--border-radius);
        font-size: var(--font-size-sm);
        font-weight: 500;
        color: var(--text-secondary);
        cursor: pointer;
        white-space: nowrap;
        transition: all var(--transition-base);
    }

    .tab-btn:hover {
        background-color: var(--bg-tertiary);
        color: var(--text-primary);
    }

    .tab-btn.active {
        background-color: var(--primary);
        color: white;
    }

    .filter-actions {
        display: flex;
        align-items: center;
        gap: var(--spacing-md);
    }

    .sort-select {
        padding: var(--spacing-sm) var(--spacing-lg);
        border: 1px solid var(--border-color);
        border-radius: var(--border-radius);
        font-size: var(--font-size-sm);
        background-color: var(--bg-primary);
        color: var(--text-primary);
        cursor: pointer;
        min-width: 140px;
    }

    .projects-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: var(--spacing-lg);
        margin-bottom: var(--spacing-2xl);
    }

    .project-card {
        background-color: var(--bg-primary);
        border: 1px solid var(--border-color);
        border-radius: var(--border-radius);
        overflow: hidden;
        transition: all var(--transition-base);
        position: relative;
    }

    .project-card:hover {
        transform: translateY(-4px);
        box-shadow: var(--shadow-lg);
        border-color: var(--primary-light);
    }

    .project-header {
        position: relative;
        height: 180px;
        overflow: hidden;
    }

    .project-cover {
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, var(--gray-100) 0%, var(--gray-200) 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: var(--font-size-3xl);
        color: var(--text-tertiary);
        overflow: hidden;
    }

    .project-cover img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        transition: transform var(--transition-slow);
    }

    .project-card:hover .project-cover img {
        transform: scale(1.1);
    }

    .project-actions {
        position: absolute;
        top: var(--spacing-md);
        right: var(--spacing-md);
        display: flex;
        gap: var(--spacing-xs);
        opacity: 0;
        transition: opacity var(--transition-base);
    }

    .project-card:hover .project-actions {
        opacity: 1;
    }

    .project-action-btn {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background-color: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(4px);
        border: none;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-primary);
        cursor: pointer;
        transition: all var(--transition-base);
    }

    .project-action-btn:hover {
        background-color: white;
        color: var(--primary);
        transform: scale(1.1);
    }

    .project-badge {
        position: absolute;
        bottom: var(--spacing-md);
        left: var(--spacing-md);
        background-color: var(--primary);
        color: white;
        padding: var(--spacing-xs) var(--spacing-sm);
        border-radius: var(--border-radius-sm);
        font-size: var(--font-size-xs);
        font-weight: 500;
    }

    .project-content {
        padding: var(--spacing-lg);
    }

    .project-title {
        font-size: var(--font-size-lg);
        font-weight: 600;
        color: var(--text-primary);
        margin-bottom: var(--spacing-sm);
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        height: 3em;
        line-height: 1.5em;
    }

    .project-description {
        color: var(--text-secondary);
        font-size: var(--font-size-sm);
        margin-bottom: var(--spacing-lg);
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
        height: 4.5em;
        line-height: 1.5em;
    }

    .project-meta {
        display: flex;
        justify-content: space-between;
        font-size: var(--font-size-xs);
        color: var(--text-tertiary);
    }

    .project-meta-item {
        display: flex;
        align-items: center;
        gap: var(--spacing-xs);
    }

    .loading-placeholder {
        grid-column: 1 / -1;
        text-align: center;
        padding: var(--spacing-3xl);
        color: var(--text-secondary);
    }

    .loading-placeholder .spinner {
        margin: 0 auto var(--spacing-md);
    }

    .pagination {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: var(--spacing-sm);
        margin-top: var(--spacing-2xl);
    }

    .pagination-btn {
        width: 40px;
        height: 40px;
        border-radius: var(--border-radius);
        border: 1px solid var(--border-color);
        background-color: var(--bg-primary);
        color: var(--text-primary);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all var(--transition-base);
    }

    .pagination-btn:hover:not(.disabled) {
        border-color: var(--primary);
        color: var(--primary);
    }

    .pagination-btn.active {
        background-color: var(--primary);
        color: white;
        border-color: var(--primary);
    }

    .pagination-btn.disabled {
        opacity: 0.5;
        cursor: not-allowed;
    }

    .empty-state {
        text-align: center;
        padding: var(--spacing-3xl);
        max-width: 400px;
        margin: var(--spacing-2xl) auto;
    }

    .empty-icon {
        width: 80px;
        height: 80px;
        background-color: var(--gray-100);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: var(--font-size-3xl);
        color: var(--text-tertiary);
        margin: 0 auto var(--spacing-lg);
    }

    .empty-title {
        font-size: var(--font-size-xl);
        font-weight: 600;
        color: var(--text-primary);
        margin-bottom: var(--spacing-sm);
    }

    .empty-description {
        color: var(--text-secondary);
        margin-bottom: var(--spacing-xl);
        line-height: 1.6;
    }

    /* 模态框样式 */
    .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.5);
        z-index: 2000;
        align-items: center;
        justify-content: center;
    }

    .modal.show {
        display: flex;
    }

    .modal-content {
        background-color: var(--bg-primary);
        border-radius: var(--border-radius-lg);
        box-shadow: var(--shadow-2xl);
        animation: modalSlideUp 0.3s ease;
    }

    .modal-sm {
        width: 90%;
        max-width: 400px;
    }

    .modal-header {
        padding: var(--spacing-lg);
        border-bottom: 1px solid var(--border-color);
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .modal-title {
        font-size: var(--font-size-lg);
        font-weight: 600;
        color: var(--text-primary);
        margin: 0;
    }

    .modal-close {
        background: none;
        border: none;
        font-size: var(--font-size-xl);
        color: var(--text-secondary);
        cursor: pointer;
        padding: var(--spacing-xs);
        line-height: 1;
    }

    .modal-body {
        padding: var(--spacing-lg);
    }

    .menu-list {
        display: flex;
        flex-direction: column;
        gap: var(--spacing-xs);
    }

    .menu-item {
        display: flex;
        align-items: center;
        gap: var(--spacing-lg);
        padding: var(--spacing-md) var(--spacing-lg);
        background: none;
        border: none;
        border-radius: var(--border-radius);
        color: var(--text-primary);
        font-size: var(--font-size-base);
        cursor: pointer;
        transition: all var(--transition-base);
        text-align: left;
    }

    .menu-item:hover {
        background-color: var(--bg-tertiary);
    }

    .menu-item.text-danger {
        color: var(--danger);
    }

    .menu-item.text-danger:hover {
        background-color: rgba(239, 68, 68, 0.1);
    }

    .menu-divider {
        height: 1px;
        background-color: var(--border-color);
        margin: var(--spacing-sm) 0;
    }

    @keyframes modalSlideUp {
        from {
            opacity: 0;
            transform: translateY(30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    @media (max-width: 768px) {
        .page-header {
            flex-direction: column;
            align-items: stretch;
        }

        .header-actions {
            flex-direction: column;
            gap: var(--spacing-md);
        }

        .search-box {
            width: 100%;
        }

        .filter-tabs {
            flex-direction: column;
            align-items: stretch;
        }

        .projects-grid {
            grid-template-columns: 1fr;
        }
    }
</style>
{% endblock %}

{% block scripts %}
<script>
    let currentPage = 1;
    let totalPages = 1;
    let currentFilter = 'all';
    let currentSearch = '';
    let currentSort = 'newest';
    let selectedProjectId = null;

    function initPage() {
        loadProjects();

        // 绑定事件监听器
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                currentPage = 1;
                loadProjects();
            });
        });

        document.getElementById('sortSelect').addEventListener('change', (e) => {
            currentSort = e.target.value;
            loadProjects();
        });

        document.getElementById('searchInput').addEventListener('input', debounce((e) => {
            currentSearch = e.target.value;
            currentPage = 1;
            loadProjects();
        }, 500));

        document.getElementById('filterBtn').addEventListener('click', () => {
            // 这里可以添加高级筛选功能
            showNotification('筛选功能开发中', 'info');
        });

        // 绑定模态框关闭事件
        document.querySelectorAll('.modal-close, .modal-cancel').forEach(btn => {
            btn.addEventListener('click', () => {
                document.getElementById('projectMenuModal').classList.remove('show');
            });
        });
    }

    async function loadProjects() {
        const grid = document.getElementById('projectsGrid');
        grid.innerHTML = `
            <div class="loading-placeholder">
                <div class="spinner"></div>
                <p>正在加载项目...</p>
            </div>
        `;

        try {
            const params = new URLSearchParams({
                page: currentPage,
                status: currentFilter !== 'all' ? currentFilter : '',
                search: currentSearch,
                sort: currentSort
            });

            const response = await fetch(`/api/projects?${params}`);
            const data = await response.json();

            if (data.projects && data.projects.length > 0) {
                renderProjects(data.projects);
                renderPagination(data.pagination);
                document.getElementById('emptyState').style.display = 'none';
            } else {
                grid.innerHTML = '';
                document.getElementById('emptyState').style.display = 'block';
                document.getElementById('pagination').innerHTML = '';
            }
        } catch (error) {
            console.error('加载项目失败:', error);
            grid.innerHTML = `
                <div class="error-state">
                    <i class="fas fa-exclamation-circle"></i>
                    <p>加载失败，请刷新重试</p>
                    <button class="btn btn-outline" onclick="loadProjects()">重试</button>
                </div>
            `;
        }
    }

    function renderProjects(projects) {
        const grid = document.getElementById('projectsGrid');

        grid.innerHTML = projects.map(project => `
            <div class="project-card" data-project-id="${project.id}">
                <div class="project-header">
                    <div class="project-cover">
                        ${project.cover_image ?
                            `<img src="/uploads/covers/${project.cover_image}" alt="${project.title}" onerror="this.onerror=null; this.parentElement.innerHTML='<span>${project.title.charAt(0)}</span>';">` :
                            `<span>${project.title.charAt(0)}</span>`
                        }
                    </div>
                    <div class="project-actions">
                        <button class="project-action-btn" onclick="showProjectMenu(${project.id})">
                            <i class="fas fa-ellipsis-h"></i>
                        </button>
                    </div>
                </div>
                <div class="project-content">
                    <h3 class="project-title">${project.title}</h3>
                    <p class="project-description">${project.description || '暂无描述'}</p>
                    <div class="project-meta">
                        <div class="project-meta-item">
                            <i class="fas fa-film"></i>
                            <span>${project.episode_count || 0} 集</span>
                        </div>
                        <div class="project-meta-item">
                            <i class="fas fa-calendar"></i>
                            <span>${formatDate(project.updated_at)}</span>
                        </div>
                    </div>
                </div>
                <a href="/projects/${project.id}" class="project-link"></a>
            </div>
        `).join('');

        // 为项目卡片添加点击事件
        document.querySelectorAll('.project-card').forEach(card => {
            const link = card.querySelector('.project-link');
            card.addEventListener('click', (e) => {
                // 确保不是点击了操作按钮或链接本身
                if (!e.target.closest('.project-actions') && !e.target.closest('.project-link')) {
                    link.click();
                }
            });
        });
    }

    function renderPagination(pagination) {
        if (!pagination || pagination.total_pages <= 1) {
            document.getElementById('pagination').innerHTML = '';
            return;
        }

        const container = document.getElementById('pagination');
        totalPages = pagination.total_pages;

        let html = '';

        // 上一页按钮
        html += `
            <button class="pagination-btn ${currentPage === 1 ? 'disabled' : ''}"
                    onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>
                <i class="fas fa-chevron-left"></i>
            </button>
        `;

        // 页码按钮
        const maxVisible = 5;
        let start = Math.max(1, currentPage - Math.floor(maxVisible / 2));
        let end = Math.min(totalPages, start + maxVisible - 1);

        if (end - start + 1 < maxVisible) {
            start = Math.max(1, end - maxVisible + 1);
        }

        if (start > 1) {
            html += `<button class="pagination-btn" onclick="changePage(1)">1</button>`;
            if (start > 2) {
                html += `<span class="pagination-ellipsis">...</span>`;
            }
        }

        for (let i = start; i <= end; i++) {
            html += `
                <button class="pagination-btn ${currentPage === i ? 'active' : ''}"
                        onclick="changePage(${i})">
                    ${i}
                </button>
            `;
        }

        if (end < totalPages) {
            if (end < totalPages - 1) {
                html += `<span class="pagination-ellipsis">...</span>`;
            }
            html += `<button class="pagination-btn" onclick="changePage(${totalPages})">${totalPages}</button>`;
        }

        // 下一页按钮
        html += `
            <button class="pagination-btn ${currentPage === totalPages ? 'disabled' : ''}"
                    onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>
                <i class="fas fa-chevron-right"></i>
            </button>
        `;

        container.innerHTML = html;
    }

    function changePage(page) {
        if (page >= 1 && page <= totalPages && page !== currentPage) {
            currentPage = page;
            loadProjects();
            // 滚动到顶部
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    }

    function showProjectMenu(projectId) {
        selectedProjectId = projectId;
        document.getElementById('projectMenuModal').classList.add('show');

        // 绑定菜单项点击事件
        document.querySelectorAll('.menu-item').forEach(item => {
            item.onclick = function() {
                const action = this.dataset.action;
                handleProjectAction(action, projectId);
                document.getElementById('projectMenuModal').classList.remove('show');
            };
        });
    }

    function handleProjectAction(action, projectId) {
        switch(action) {
            case 'edit':
                window.location.href = `/projects/${projectId}/edit`;
                break;
            case 'duplicate':
                duplicateProject(projectId);
                break;
            case 'export':
                exportProject(projectId);
                break;
            case 'delete':
                deleteProject(projectId);
                break;
        }
    }

    async function deleteProject(projectId) {
        if (!confirm('确定要删除这个项目吗？此操作不可恢复。')) {
            return;
        }

        try {
            const response = await fetch(`/api/projects/${projectId}`, {
                method: 'DELETE'
            });

            if (response.ok) {
                showNotification('项目删除成功', 'success');
                loadProjects(); // 重新加载项目列表
            } else {
                const data = await response.json();
                showNotification(data.error || '删除失败', 'error');
            }
        } catch (error) {
            showNotification('删除失败，请稍后重试', 'error');
        }
    }

    async function duplicateProject(projectId) {
        showNotification('复制功能开发中', 'info');
    }

    async function exportProject(projectId) {
        showNotification('导出功能开发中', 'info');
    }

    function getStatusText(status) {
        const statusMap = {
            'draft': '草稿',
            'active': '进行中',
            'completed': '已完成',
            'public': '已公开'
        };
        return statusMap[status] || status;
    }

    function formatDate(dateString) {
        const date = new Date(dateString);
        const now = new Date();
        const diffTime = Math.abs(now - date);
        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

        if (diffDays === 0) {
            return '今天';
        } else if (diffDays === 1) {
            return '昨天';
        } else if (diffDays <= 7) {
            return `${diffDays}天前`;
        } else {
            return date.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
        }
    }

    // 防抖函数
    function debounce(func, wait) {
        let timeout;
        return function executedFunction(...args) {
            const later = () => {
                clearTimeout(timeout);
                func(...args);
            };
            clearTimeout(timeout);
            timeout = setTimeout(later, wait);
        };
    }

    document.addEventListener('DOMContentLoaded', initPage);
</script>
