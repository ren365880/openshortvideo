<!-- templates/components/modal.html -->
<div class="modal" id="alertModal">
    <div class="modal-content modal-md">
        <div class="modal-header">
            <h3 class="modal-title" id="modalTitle">提示</h3>
            <button class="modal-close">&times;</button>
        </div>
        <div class="modal-body">
            <div class="modal-icon" id="modalIcon">
                <i class="fas fa-info-circle"></i>
            </div>
            <p class="modal-message" id="modalMessage">消息内容</p>
        </div>
        <div class="modal-footer">
            <button class="btn btn-primary" id="modalConfirmBtn">确定</button>
        </div>
    </div>
</div>

<style>
    .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.5);
        z-index: 9999;
        align-items: center;
        justify-content: center;
        padding: 20px;
    }

    .modal.show {
        display: flex;
    }

    .modal-content {
        background: white;
        border-radius: 12px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        animation: modalSlideUp 0.3s ease;
        width: 100%;
    }

    .modal-md {
        max-width: 400px;
    }

    .modal-lg {
        max-width: 600px;
    }

    .modal-header {
        padding: 20px 24px;
        border-bottom: 1px solid var(--border-color);
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .modal-title {
        font-size: 1.2rem;
        font-weight: 600;
        color: var(--text-primary);
        margin: 0;
    }

    .modal-close {
        background: none;
        border: none;
        font-size: 1.5rem;
        color: var(--text-secondary);
        cursor: pointer;
        padding: 5px;
        line-height: 1;
    }

    .modal-body {
        padding: 30px 24px;
        text-align: center;
    }

    .modal-icon {
        margin-bottom: 20px;
    }

    .modal-icon i {
        font-size: 3rem;
    }

    .modal-success .modal-icon i {
        color: var(--success);
    }

    .modal-error .modal-icon i {
        color: var(--danger);
    }

    .modal-warning .modal-icon i {
        color: var(--warning);
    }

    .modal-info .modal-icon i {
        color: var(--info);
    }

    .modal-message {
        font-size: 1.1rem;
        color: var(--text-primary);
        line-height: 1.6;
        margin: 0;
    }

    .modal-footer {
        padding: 20px 24px;
        border-top: 1px solid var(--border-color);
        display: flex;
        justify-content: flex-end;
        gap: 12px;
    }

    @keyframes modalSlideUp {
        from {
            opacity: 0;
            transform: translateY(30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    @media (max-width: 768px) {
        .modal {
            padding: 10px;
        }

        .modal-content {
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-body {
            padding: 20px 16px;
        }

        .modal-footer {
            padding: 16px;
            flex-direction: column;
        }

        .modal-footer .btn {
            width: 100%;
        }
    }
</style>

<script>
    // 全局模态框函数
    function showModal(options) {
        const modal = document.getElementById('alertModal');
        const modalContent = modal.querySelector('.modal-content');

        // 设置模态框内容
        document.getElementById('modalTitle').textContent = options.title || '提示';
        document.getElementById('modalMessage').textContent = options.message;

        // 设置图标
        const modalIcon = document.getElementById('modalIcon');
        const iconMap = {
            'success': 'fa-check-circle',
            'error': 'fa-exclamation-circle',
            'warning': 'fa-exclamation-triangle',
            'info': 'fa-info-circle'
        };

        // 移除所有类型类
        modalContent.classList.remove('modal-success', 'modal-error', 'modal-warning', 'modal-info');

        // 添加当前类型类
        if (options.type) {
            modalContent.classList.add(`modal-${options.type}`);
            const icon = modalIcon.querySelector('i');
            icon.className = `fas ${iconMap[options.type] || 'fa-info-circle'}`;
        }

        // 设置确认按钮文本
        const confirmBtn = document.getElementById('modalConfirmBtn');
        confirmBtn.textContent = options.confirmText || '确定';

        // 设置确认按钮回调
        confirmBtn.onclick = function() {
            if (typeof options.onConfirm === 'function') {
                options.onConfirm();
            }
            hideModal();
        };

        // 显示模态框
        modal.classList.add('show');

        // 返回关闭函数
        return {
            hide: () => hideModal()
        };
    }

    function hideModal() {
        const modal = document.getElementById('alertModal');
        modal.classList.remove('show');
    }

    // 绑定关闭事件
    document.addEventListener('DOMContentLoaded', function() {
        const modal = document.getElementById('alertModal');

        // 点击模态框背景关闭
        modal.addEventListener('click', function(e) {
            if (e.target === modal) {
                hideModal();
            }
        });

        // 点击关闭按钮关闭
        modal.querySelector('.modal-close').addEventListener('click', hideModal);
    });
</script>
